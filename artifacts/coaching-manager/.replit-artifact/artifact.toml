kind = "web"
previewPath = "/"
title = "Coaching Manager"
version = "1.0.0"
id = "artifacts/coaching-manager"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21498

[services.development]
run = "pnpm --filter @workspace/coaching-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coaching-manager", "run", "build" ]
serve = "static"
publicDir = "artifacts/coaching-manager/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21498"
BASE_PATH = "/"
